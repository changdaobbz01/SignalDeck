name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: SignalDeck-windows
            artifact_path: artifacts/SignalDeck-windows.zip
            build_command: python -m PyInstaller --clean --noconfirm SignalDeck.spec
            pack_command: powershell -Command "New-Item -ItemType Directory -Force -Path artifacts | Out-Null; Compress-Archive -Path dist/SignalDeck/* -DestinationPath artifacts/SignalDeck-windows.zip"
          - os: macos-latest
            artifact_name: SignalDeck-macos
            artifact_path: artifacts/SignalDeck-macos.zip
            build_command: python3 -m PyInstaller --clean --noconfirm SignalDeck.spec
            pack_command: bash -lc "mkdir -p artifacts && ditto -c -k --sequesterRsrc --keepParent dist/SignalDeck.app artifacts/SignalDeck-macos.zip"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build desktop package
        run: ${{ matrix.build_command }}

      - name: Archive package
        run: ${{ matrix.pack_command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
